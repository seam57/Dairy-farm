services:
  - type: web
    name: livestock-pro
    runtime: python3
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn livestock_project.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: livestock_project.settings
      - key: PYTHON_VERSION
        value: 3.11.0