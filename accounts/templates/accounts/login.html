<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Livestock System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #e9ecef; }
        .login-card { max-width: 400px; margin: 100px auto; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .password-field-container { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Login</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    
                    <div class="mb-3 password-field-container">
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="Password" required>
                        <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="toggleLoginPassword()"></i>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 text-center">New here? <a href="/register/">Create Account</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleLoginPassword() {
            const passwordField = document.getElementById("id_password");
            const eyeIcon = document.getElementById("eyeIcon");
            
            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
