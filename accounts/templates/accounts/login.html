<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        /* আপনার সুন্দর ডিজাইনের সিএসএস এখানে থাকবে */
        body { background: #f4f7f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-card h1 { font-size: 2.5rem; margin-bottom: 10px; color: #333; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: #2ecc71; box-shadow: 0 0 5px rgba(46, 204, 113, 0.3); }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #2ecc71; color: white; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #27ae60; }
        .errorlist { color: red; list-style: none; padding: 0; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome Back</h1>
        <p>Log in to manage your livestock</p>

        <form method="POST">
            {% csrf_token %}
            
            {% if error_message %}
                <div style="color: #d32f2f; margin-bottom: 15px; font-size: 0.9rem; padding: 10px; background: #ffebee; border-radius: 5px;">
                    <p>{{ error_message }}</p>
                </div>
            {% endif %}

            <div class="input-group">
                <label for="id_username">Username:</label>
                <input type="text" id="id_username" name="username" value="{{ username }}" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem;">
            </div>

            <div class="input-group">
                <label for="id_password">Password:</label>
                <input type="password" id="id_password" name="password" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem;">
            </div>

            <button type="submit">Login</button>
        </form>
        <p style="margin-top: 20px;">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</body>
</html>
