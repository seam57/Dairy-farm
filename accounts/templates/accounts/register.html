<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | DairyFarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        .form-label { font-weight: 600; color: #444; margin-bottom: 5px; }
        .btn-register { background: #11998e; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-register:hover { background: #0e857a; transform: translateY(-2px); }
        .role-box { background: #f8f9fa; border: 1px dashed #11998e; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="register-card">
    <h3 class="text-center mb-4 text-dark fw-bold">Create Account</h3>
    
    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label small">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <small class="text-danger">{{ field.errors.0 }}</small>
            {% endif %}
        </div>
        {% endfor %}

        <div class="role-box">
            <label class="form-label d-block mb-2">I am a:</label>
            <div class="d-flex justify-content-around">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="farmer" value="farmer" checked>
                    <label class="form-check-label" for="farmer">Farmer</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="doctor" value="doctor">
                    <label class="form-check-label" for="doctor">Doctor</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-register shadow">Sign Up Now</button>
    </form>
    
    <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login' %}" class="text-success fw-bold">Login</a></p>
</div>

</body>
</html>
