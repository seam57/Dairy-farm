<h2>Create Account</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <p>
        <label>Select Role:</label><br>
        <input type="radio" name="role" value="farmer" checked> Farmer
        <input type="radio" name="role" value="doctor"> Doctor
    </p>
    <button type="submit">Sign Up</button>
</form>
