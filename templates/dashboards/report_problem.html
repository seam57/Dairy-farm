<body class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h3 class="text-danger mb-4"><i class="fas fa-exclamation-triangle"></i> Report Problem for {{ animal.tag_id }}</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Describe the symptoms or problem:</label>
                <textarea name="symptoms" class="form-control" rows="4" placeholder="e.g. Fever, not eating, or milk production decreased..." required></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Send to Doctor</button>
                <a href="{% url 'farmer_dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </form>
    </div>
</body>
