{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Livestock Pro{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #1a252f; min-height: 100vh; color: white; position: fixed; width: 250px; z-index: 1000; padding: 20px; }
        .nav-link { color: #95a5a6; padding: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: #2c3e50; color: white; opacity: 1; }
        .main-content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
        .custom-card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: white; margin-bottom: 25px; padding: 20px; }
        .ai-doctor-btn { border: 2px solid #2ecc71; border-radius: 10px; margin-top: 10px; transition: 0.3s; }
        .ai-doctor-btn:hover { background: rgba(46, 204, 113, 0.1); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold mb-4 text-center text-success border-bottom pb-3">LIVESTOCK PRO</h4>
    <nav class="nav flex-column">
        <a href="{% url 'profile_view' %}" class="nav-link {% if request.resolver_match.url_name == 'profile_view' %}active{% endif %}">
            <i class="fas fa-user-circle me-2"></i> Profile
        </a>
        <a href="{% url 'farmer_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'farmer_dashboard' %}active{% endif %}">
            <i class="fas fa-th-large me-2"></i> Dashboard
        </a>
        <a href="{% url 'daily_diary' %}" class="nav-link {% if request.resolver_match.url_name == 'daily_diary' %}active{% endif %}">
            <i class="fas fa-history me-2"></i> AgroTrack
        </a>
        <div class="ai-doctor-btn">
            <a href="{% url 'farm_ai_doctor' %}" class="nav-link text-success fw-bold {% if request.resolver_match.url_name == 'farm_ai_doctor' %}active{% endif %}">
                <i class="fas fa-robot me-2"></i> AI Doctor
            </a>
        </div>
        <a href="{% url 'logout' %}" class="nav-link mt-5 text-danger">
            <i class="fas fa-power-off me-2"></i> Logout
        </a>
    </nav>
</div>

<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
